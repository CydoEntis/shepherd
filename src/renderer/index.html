<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit</title>
    <script>
      (function () {
        var extras = ['space', 'nebula', 'solar', 'aurora', 'mars', 'pulsar', 'cosmos', 'void'];
        var t = localStorage.getItem('orbit-theme') || 'space';
        var isDark = t === 'dark' || extras.indexOf(t) !== -1 ||
          (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        if (extras.indexOf(t) !== -1) document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
