name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" 2>/dev/null \
            || gh release create "${{ github.ref_name }}" \
              --draft \
              --title "Orbit ${{ github.ref_name }}" \
              --generate-notes \
              --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
          - os: macos-latest
            args: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y build-essential libsecret-1-dev libx11-dev libxkbfile-dev imagemagick

      - name: Generate Linux icon sizes
        if: runner.os == 'Linux'
        run: |
          mkdir -p build/icons
          for size in 16 24 32 48 64 96 128 192 256 512 1024; do
            convert build/icon.png \
              -resize ${size}x${size} \
              -background none -gravity center -extent ${size}x${size} \
              build/icons/${size}x${size}.png
          done

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build
        run: npm run build

      - name: Package & publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
