appId: com.cydoentis.orbit
productName: Orbit
copyright: "Copyright © 2025 CydoEntis"

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - "!out/**/*.map"

extraResources:
  - from: logo.png
    to: logo.png

asarUnpack:
  - "**/*.node"

extraMetadata:
  main: out/main/index.js

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]

linux:
  icon: build/icons
  category: Development
  maintainer: CydoEntis <cydoentis@gmail.com>
  executableName: orbit
  desktop:
    entry:
      Name: Orbit
      Comment: Multi-session terminal manager for AI coding agents
      StartupWMClass: orbit
      Categories: Development;IDE;
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  include: build/installer.nsh

publish:
  provider: github
  owner: CydoEntis
  repo: orbit
